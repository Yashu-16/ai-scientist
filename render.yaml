services:
  - type: web
    name: ai-scientist-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBMED_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.11
    healthCheckPath: /health
